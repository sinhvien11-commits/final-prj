<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OEG Cyber Hub</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #0A0A0B;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
  }
  .phone-wrap {
    width: 100%;
    height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
    background: #0A0A0B;
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 60px rgba(0,0,0,0.6);
  }
  iframe {
    flex: 1;
    width: 100%;
    border: none;
    display: block;
    background: #0A0A0B;
  }
  nav.bottom-nav {
    flex-shrink: 0;
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 8px 0 12px;
    background: rgba(26,26,26,0.92);
    backdrop-filter: blur(20px);
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  nav.bottom-nav button {
    all: unset;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    color: rgba(187,201,207,0.6);
    font-size: 10px;
    transition: color 0.15s, transform 0.15s;
    padding: 4px 6px;
    text-align: center;
  }
  nav.bottom-nav button:active {
    transform: scale(0.9);
  }
  nav.bottom-nav button.active {
    color: #9eff00;
    font-weight: 700;
  }
  nav.bottom-nav button svg {
    width: 20px;
    height: 20px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.8;
  }
</style>
</head>
<body>
<div class="phone-wrap">
  <iframe id="viewer" src="05-home.html"></iframe>

  <nav class="bottom-nav">
    <button class="active" data-src="05-home.html">
      <svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
      Trang chủ
    </button>
    <button data-src="03-esports.html">
      <svg viewBox="0 0 24 24"><path d="M6 12h12M9 4h6l1 4H8z"/><circle cx="7" cy="14" r="3"/><circle cx="17" cy="14" r="3"/></svg>
      Esports
    </button>
    <button data-src="04-quests.html">
      <svg viewBox="0 0 24 24"><path d="M12 2l2.5 6.5L21 9l-5 4.5L17.5 21 12 17l-5.5 4L8 13.5 3 9l6.5-.5z"/></svg>
      Nhiệm vụ
    </button>
    <button data-src="02-store.html">
      <svg viewBox="0 0 24 24"><path d="M3 9l1.5-5h15L21 9"/><path d="M3 9h18v11H3z"/><path d="M9 13a3 3 0 0 0 6 0"/></svg>
      Cửa hàng
    </button>
    <button data-src="01-review.html">
      <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
      Đánh giá
    </button>
  </nav>
</div>

<script>
  const buttons = document.querySelectorAll('nav.bottom-nav button');
  const viewer = document.getElementById('viewer');
  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      buttons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      viewer.src = btn.dataset.src;
    });
  });
</script>
</body>
</html>
