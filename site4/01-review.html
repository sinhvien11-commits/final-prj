<!DOCTYPE html><html class="dark" lang="vi" style=""><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Đánh Giá Trải Nghiệm - OEG CYBER HUB</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;family=Montserrat:wght@700;800&amp;display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {

                        "primary-container": "#9cfb00",
                        "tertiary-fixed": "#e5e2e1",
                        "secondary": "#c8c6c5",
                        "on-tertiary-fixed-variant": "#474646",
                        "on-primary-fixed-variant": "#2e4f00",
                        "surface-bright": "#393939",

                        "on-error": "#690005",
                        "inverse-surface": "#e2e2e2",
                        "surface-tint": "#88dc00",
                        "secondary-fixed-dim": "#c8c6c5",
                        "surface-container-highest": "#353535",
                        "on-surface": "#e2e2e2",

                        "on-surface-variant": "#c0cbad",
                        "tertiary-container": "#e5e2e1",

                        "surface-container": "#1f1f1f",
                        "surface-container-low": "#1b1b1b",
                        "on-primary-fixed": "#0f2000",

                        "primary-fixed-dim": "#88dc00",
                        "on-tertiary-container": "#656464",
                        "inverse-primary": "#3f6900",
                        "on-primary": "#1e3700",
                        "tertiary": "#ffffff",
                        "error": "#ffb4ab",
                        "surface-variant": "#353535",
                        "on-error-container": "#ffdad6",
                        "on-secondary-container": "#b7b5b4",
                        "on-tertiary-fixed": "#1c1b1b",
                        "background": "#131313",
                        "on-secondary-fixed-variant": "#474746",
                        "outline": "#8a947a",
                        "on-secondary-fixed": "#1c1b1b",
                        "on-tertiary": "#313030",
                        "error-container": "#93000a",
                        "tertiary-fixed-dim": "#c8c6c5",
                        "surface-container-high": "#2a2a2a",
                        "secondary-container": "#474746",

                        "surface-container-lowest": "#0e0e0e"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",

                    "spacing": {

<style>
        body { font-family: 'Inter', sans-serif; }
        .cyber-glow { box-shadow: 0px 0px 15px rgba(158, 255, 0, 0.4); }
        .cyber-text-glow { text-shadow: 0 0 8px rgba(158, 255, 0, 0.8), 0 0 16px rgba(158, 255, 0, 0.4); }
        .glass-panel {
            background: rgba(19, 19, 19, 0.7);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(158, 255, 0, 0.3);
            box-shadow: 0 0 30px rgba(158, 255, 0, 0.15), inset 0 0 20px rgba(158, 255, 0, 0.05);
        }
        .emoji-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            filter: grayscale(100%) opacity(0.4);
            transform: scale(0.9);
        }
        .emoji-btn:hover, .emoji-btn.active {
            filter: grayscale(0%) opacity(1) drop-shadow(0 0 10px rgba(158, 255, 0, 0.6));
            transform: scale(1.15);
        }
        .cyber-input:focus {
            box-shadow: 0 0 15px rgba(158, 255, 0, 0.2), inset 0 0 10px rgba(158, 255, 0, 0.1);
        }
        .cyber-btn {
            background: linear-gradient(90deg, rgba(136,220,0,0.9) 0%, rgba(156,251,0,1) 100%);
            box-shadow: 0 0 20px rgba(158, 255, 0, 0.4);
            border: 1px solid rgba(158, 255, 0, 0.8);
            position: relative;
            overflow: hidden;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
        .cyber-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-20deg);
            animation: shine 3s infinite;
        }
        @keyframes shine {
            0% { left: -100%; }
            20% { left: 200%; }
            100% { left: 200%; }
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col relative overflow-hidden">
<!-- Dimmed Background Content (Simulating Profile Page) -->
<div class="absolute inset-0 z-0 blur-sm pointer-events-none opacity-40">
<!-- TopAppBar Placeholder -->
<div class="bg-surface/80 fixed top-0 w-full z-50 flex items-center justify-between px-margin-mobile h-16 border-b border-surface-variant backdrop-blur-xl"><div class="flex items-center gap-unit font-label-bold text-label-bold cursor-pointer"><span class="text-primary-fixed">VI</span><span class="text-on-surface-variant opacity-40 mx-1">|</span><span class="text-on-surface-variant opacity-40">EN</span></div><div class="font-label-bold text-label-bold font-bold text-primary tracking-wider absolute left-1/2 -translate-x-1/2 uppercase">OEG CYBER HUB</div><button class="text-on-surface-variant hover:text-primary transition-colors flex items-center justify-center"><span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">notifications</span></button></div>
<div class="pt-24 px-margin-mobile flex flex-col gap-stack-lg h-full">
<div class="w-full h-32 bg-surface-container rounded-xl"></div>
<div class="w-full h-48 bg-surface-container rounded-xl"></div>
<div class="w-full h-24 bg-surface-container rounded-xl"></div>
</div>
</div>
<!-- Main Overlay Container -->
<div class="fixed inset-0 z-40 flex items-center justify-center p-margin-mobile bg-black/70 backdrop-blur-md">
<!-- Pop-up Modal -->
<div class="glass-panel w-full max-w-[360px] rounded-[24px] p-stack-lg flex flex-col gap-stack-lg relative animate-[fadeInUp_0.3s_ease-out]">
<!-- Close Button -->
<button class="absolute top-4 right-4 text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
<!-- Header -->
<div class="text-center mt-stack-sm">
<h2 class="font-headline-md text-headline-md text-primary mb-stack-sm cyber-text-glow">Trải nghiệm hôm nay thế nào bro?</h2>
<p class="font-body-md text-body-md text-secondary-fixed-dim">Đánh giá của bạn giúp chúng tôi cải thiện dịch vụ</p>
</div>
<!-- Emoji Evaluation -->
<div class="flex justify-between items-center px-stack-sm py-stack-md">
<button class="emoji-btn flex flex-col items-center gap-unit group">
<span class="text-4xl drop-shadow-md">😠</span>
</button>
<button class="emoji-btn flex flex-col items-center gap-unit group">
<span class="text-4xl drop-shadow-md">🙁</span>
</button>
<button class="emoji-btn flex flex-col items-center gap-unit group">
<span class="text-4xl drop-shadow-md">😐</span>
</button>
<button class="emoji-btn flex flex-col items-center gap-unit group active rounded-full p-2 bg-surface-container-highest/30">
<span class="text-4xl drop-shadow-md">🙂</span>
</button>
<button class="emoji-btn flex flex-col items-center gap-unit group">
<span class="text-4xl drop-shadow-md">🤩</span>
</button>
</div>
<!-- Feedback Input -->
<div class="w-full">
<textarea class="cyber-input w-full bg-surface-container-lowest text-on-surface font-body-md text-body-md border border-surface-variant rounded-xl p-stack-md focus:border-primary-fixed focus:ring-1 focus:ring-primary-fixed focus:outline-none resize-none placeholder:text-surface-variant transition-all duration-300 h-24" placeholder="Chia sẻ thêm nhé... (Không bắt buộc)"></textarea>
</div>
<!-- Submit Action -->
<div class="flex flex-col gap-stack-sm mt-stack-sm">
<button class="cyber-btn w-full text-on-primary-fixed font-label-bold text-label-bold py-stack-md rounded-xl flex items-center justify-center gap-unit transition-all hover:scale-[1.02] active:scale-95 uppercase tracking-wider">
                    GỬI ĐÁNH GIÁ
                </button>
<p class="text-center font-label-sm text-label-sm text-secondary-fixed-dim mt-2">Hoàn thành để nhận <span class="text-primary-fixed font-bold cyber-text-glow text-[13px]">GIẢM 10%</span> cho lần chơi tới</p>
</div>
</div>
</div>
<!-- BottomNavBar (Hidden on md, visible on mobile) -->

<style>
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
    </style>
<script>
        // Simple script to handle emoji selection
        document.querySelectorAll('.emoji-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.emoji-btn').forEach(b => {
                    b.classList.remove('active', 'bg-surface-container-highest/30', 'rounded-full', 'p-2');
                });
                this.classList.add('active', 'bg-surface-container-highest/30', 'rounded-full', 'p-2');
            });
        });
    </script>


</body></html>
